services:
  # --- BACKEND (Django) ---
  - type: web
    name: soavs-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soavs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: soavs-backend
          property: host
      - key: CREATE_SUPERUSER
        value: "true"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true

  # --- FRONTEND (Vue/Vite) ---
  - type: web
    name: soavs-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm run build"
    staticPublishPath: "dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: soavs-backend
          property: url

databases:
  - name: soavs-db
    plan: free
